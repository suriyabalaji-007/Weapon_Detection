<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Weapon Detection System</title>
    <!-- Styles -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="bg-gradient-to-br from-slate-100 to-slate-200 min-h-screen flex items-center justify-center p-4">
    
    <main class="glass-card p-8 w-full max-w-lg animate-fade-in">
        
        <header class="text-center mb-10">
            <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight mb-2">Create Account</h1>
            <p class="text-slate-500 font-medium">Join the professional security network</p>
        </header>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="mb-6 p-4 rounded-xl flex items-center gap-3 {% if category == 'error' %}bg-red-50 text-red-700 border border-red-100{% else %}bg-emerald-50 text-emerald-700 border border-emerald-100{% endif %}" role="alert">
                        <span class="text-sm font-semibold">{{ message }}</span>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="/signup" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            
            <div class="space-y-2 md:col-span-2">
                <label for="username" class="block text-sm font-bold text-slate-700 ml-1">Username</label>
                <input type="text" id="username" name="username" required class="input-premium" placeholder="security_admin">
            </div>

            <div class="space-y-2 md:col-span-2">
                <label for="email" class="block text-sm font-bold text-slate-700 ml-1">Official Email</label>
                <input type="email" id="email" name="email" required class="input-premium" placeholder="name@company.com">
            </div>

            <div class="space-y-2">
                <label for="password" class="block text-sm font-bold text-slate-700 ml-1">Password</label>
                <input type="password" id="password" name="password" required minlength="6" class="input-premium" placeholder="••••••••">
            </div>

            <div class="space-y-2">
                <label for="confirm_password" class="block text-sm font-bold text-slate-700 ml-1">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" required minlength="6" class="input-premium" placeholder="••••••••">
            </div>

            <div class="md:col-span-2 mt-2">
                <button type="submit" class="btn-premium btn-premium-primary w-full text-lg shadow-xl py-4">
                    Create Security Profile
                </button>
            </div>

        </form>

        <footer class="mt-8 pt-6 border-t border-slate-200/50 text-center">
            <p class="text-slate-500 text-sm font-medium">
                Already registered? 
                <a href="/login" class="text-blue-600 hover:text-blue-700 font-bold ml-1 transition-colors">Sign in here</a>
            </p>
        </footer>

    </main>

</body>
</html>

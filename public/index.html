<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Weapon Detection System</title>
    <meta name="description" content="Secure login for the advanced YOLO-based Weapon Detection System.">
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Styles -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-gradient-to-br from-slate-100 to-slate-200 min-h-screen flex items-center justify-center p-4">
    
    <main class="glass-card p-8 w-full max-w-md animate-fade-in" id="login-container">
        
        <header class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-600 rounded-2xl shadow-lg mb-4 pulse-glow">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                </svg>
            </div>
            <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight mb-2">Security Hub</h1>
            <p class="text-slate-500 font-medium">Weapon Detection System Login</p>
        </header>

        <div id="status-message"></div>

        <form class="space-y-6" id="login-form">
            <div class="space-y-2">
                <label for="email" class="block text-sm font-bold text-slate-700 ml-1">Email Address</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    required 
                    class="input-premium"
                    placeholder="name@example.com"
                    autocomplete="email"
                >
            </div>

            <div class="space-y-2">
                <label for="password" class="block text-sm font-bold text-slate-700 ml-1">Secure Password</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    required 
                    class="input-premium"
                    placeholder="••••••••"
                    autocomplete="current-password"
                >
            </div>

            <button type="submit" class="btn-premium btn-premium-primary w-full text-lg shadow-xl" id="btn-login">
                <span>Access Dashboard</span>
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"></path>
                </svg>
            </button>
        </form>

        <footer class="mt-8 pt-6 border-t border-slate-200/50 text-center">
            <p class="text-slate-500 text-sm font-medium">
                New to the system? 
                <a href="#" class="text-blue-600 hover:text-blue-700 font-bold ml-1 transition-colors underline">Backend required for signup</a>
            </p>
        </footer>

    </main>

    <script src="/js/main.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            alert('This is a static preview on Netlify. A Python backend is required for full functionality.');
        });
    </script>
</body>
</html>
